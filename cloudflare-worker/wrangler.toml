name = "leadvyne-api-proxy"
main = "worker.js"
compatibility_date = "2026-01-01"

# Two schedules, dispatched by event.cron in `scheduled()`:
#  - "0 2 * * *"     Integrations tab health check, once daily for every client
#                    (runDailyHealthCheckForAllClients in worker.js).
#  - "*/20 * * * *"  Shopify module — abandoned-cart nudge sweep
#                    (sweepAbandonedShopifyCheckouts in worker.js).
[triggers]
crons = ["0 2 * * *", "*/20 * * * *"]

# Non-secret config (safe to commit) — override per-environment with `wrangler.toml` vars
# if you ever run a staging Worker alongside production.
[vars]
NOCODB_BASE = "https://whizz.aiingo.com"
AUTHENTIK_BASE = "https://secure.leadvyne.com"
ALLOWED_ORIGINS = "https://app.leadvyne.com,https://leadvyne.com"
# Channels module — base URL of the Chatwoot install new client accounts are provisioned on.
CHATWOOT_INSTANCE_BASE = "https://app.aiingo.com"
# Billing module — see SETUP.md "Billing module"
APP_BASE_URL = "https://app.leadvyne.com/dashboard.html"
# This Worker's own public base URL — used to build the Shopify OAuth redirect_uri and webhook
# address (Shopify calls back into this Worker, so it needs to know its own address).
WORKER_BASE_URL = "https://leadvyne-api-proxy.leadvyne.workers.dev"
# Starter and Pro (INR, AED) are live; Growth still needs a Product/Price created in Stripe.
STRIPE_PLAN_PRICE_IDS = "price_1TWsQ1JWa5B2ayZgL5zPAf3U,price_1Tpv9nJWa5B2ayZgiCfm5jNo,REPLACE_STRIPE_PRICE_GROWTH_INR,REPLACE_STRIPE_PRICE_GROWTH_AED,price_1TpvODJWa5B2ayZg5kNKP689,price_1TpvNsJWa5B2ayZgDMLLFGj8"
STRIPE_ADDON_PRICE_IDS = "price_1TpvHaJWa5B2ayZgydjFobcB,price_1TpvIvJWa5B2ayZghpfgBxli,price_1TpvPlJWa5B2ayZgHya1YHiK,price_1TpvPRJWa5B2ayZgWmPFKXvG"

# Secrets (NOT stored here — set via `wrangler secret put <NAME>`):
#   NOCODB_TOKEN            the master NocoDB token (nc_pat_...)
#   SESSION_SIGNING_KEY     a long random string, e.g. `openssl rand -hex 32`
#   CHATWOOT_PLATFORM_TOKEN Chatwoot Platform API token — see SETUP.md "Channels module"
#   META_APP_ID             Meta Tech Provider app id (Embedded Signup token exchange)
#   META_APP_SECRET         Meta Tech Provider app secret (Embedded Signup token exchange)
#   STRIPE_SECRET_KEY       Stripe secret key — see SETUP.md "Billing module"
#   STRIPE_WEBHOOK_SECRET   Stripe webhook signing secret for /billing/webhook
#   RESEND_API_KEY          Resend API key — task-notify emails (SETUP.md "Tasks") AND billing
#                           receipts/dunning/trial-reminder emails (SETUP.md "Billing module")
#   RESEND_FROM_EMAIL       optional, defaults to "Leadvyne Tasks <tasks@leadvyne.com>"
#   BILLING_FROM_EMAIL      optional, defaults to "Leadvyne Billing <billing@leadvyne.com>" — set
#                           this to a domain verified in Resend, or billing emails will be rejected
#   ADMIN_PASSCODE          admin.html login passcode — see SETUP.md "Admin panel"
#   SHOPIFY_API_KEY         Shopify Partners app's Client ID — see SETUP.md "Shopify module"
#   SHOPIFY_API_SECRET      Shopify Partners app's Client Secret (also verifies OAuth + webhook HMACs)
#   GEMINI_API_KEY          Google Generative Language API key (Google AI Studio) — see SETUP.md
#                           "Ecom Conversation Engine". One shared key for all clients, same as
#                           the n8n engine's single Gemini credential — not per-client. Powers the
#                           /engine/webhook intent/sentiment classifier and voice transcription;
#                           if unset, the classifier falls back to each client's own OpenRouter
#                           key and voice notes fall back to a placeholder ("(sent a voice note)")
#                           instead of a real transcript.
