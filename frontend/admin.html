<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Leadvyne · Admin</title>
<link rel="icon" type="image/webp" href="http://aiingo.com/wp-content/uploads/2026/01/cropped-Aiingo-1.png.webp">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#E9EEEC; --card:#FFFFFF; --ink:#0F1F1A; --muted:#5B6B65;
  --accent:#0E7C5A; --accent-ink:#0A5C43; --accent-soft:#D8EEE4;
  --line:#D7E0DC; --line-strong:#C2CEC9; --warn:#9A5B12; --warn-soft:#F6ECD9;
  --r:10px; --mono:"JetBrains Mono",ui-monospace,monospace;
  --disp:"Space Grotesk",system-ui,sans-serif; --body:"Inter",system-ui,sans-serif;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--body);background:var(--bg);color:var(--ink);min-height:100vh}

/* LOGIN OVERLAY */
#login-overlay{
  position:fixed;inset:0;z-index:1000;
  background:rgba(10,20,16,0.82);
  backdrop-filter:blur(6px);
  display:flex;align-items:center;justify-content:center;
  padding:1rem;
}
#login-overlay.hidden{display:none}
.login-card{
  background:var(--card);border-radius:16px;
  padding:2.5rem 2rem;width:100%;max-width:480px;
  box-shadow:0 24px 64px rgba(0,0,0,0.28);
}
.login-card h1{font-family:var(--disp);font-size:1.5rem;font-weight:700;color:var(--ink);margin-bottom:.25rem;display:flex;align-items:center;gap:.5rem}
.login-card h1 img{height:1.5rem;width:1.5rem;object-fit:contain}
.login-card p{color:var(--muted);font-size:.875rem;margin-bottom:1.75rem}
.form-group{margin-bottom:1rem}
.form-group label{display:block;font-size:.8125rem;font-weight:500;color:var(--ink);margin-bottom:.375rem}
.form-group input{
  width:100%;padding:.625rem .875rem;border:1.5px solid var(--line-strong);
  border-radius:var(--r);font-family:var(--body);font-size:.875rem;
  color:var(--ink);background:#fff;outline:none;
  transition:border-color .15s;
}
.form-group input:focus{border-color:var(--accent)}
.form-group input::placeholder{color:var(--muted)}
.form-section-label{
  font-size:.75rem;font-weight:600;color:var(--muted);
  text-transform:uppercase;letter-spacing:.06em;
  margin:1.25rem 0 .75rem;border-top:1px solid var(--line);padding-top:1rem;
}
.btn-primary{
  width:100%;padding:.75rem;background:var(--accent);color:#fff;
  border:none;border-radius:var(--r);font-family:var(--body);font-size:.9375rem;
  font-weight:600;cursor:pointer;margin-top:1.25rem;
  transition:background .15s,transform .1s;
}
.btn-primary:hover{background:var(--accent-ink)}
.btn-primary:active{transform:scale(.98)}
#login-error{
  color:#c0392b;font-size:.8125rem;margin-top:.75rem;
  padding:.5rem .75rem;background:#fdf0f0;border-radius:6px;
  display:none;
}

/* HEADER */
#header{
  background:var(--card);border-bottom:1.5px solid var(--line);
  padding:.875rem 1.5rem;
  display:flex;align-items:center;gap:1rem;position:sticky;top:0;z-index:100;
}
.brand{font-family:var(--disp);font-size:1.125rem;font-weight:700;color:var(--ink);display:inline-flex;align-items:center;gap:.5rem}
.brand span{color:var(--accent)}
.brand img{height:1.25rem;width:1.25rem;object-fit:contain}
.client-count-badge{
  background:var(--accent-soft);color:var(--accent-ink);
  font-size:.75rem;font-weight:600;padding:.25rem .625rem;border-radius:999px;
  font-family:var(--mono);
}
.header-search{
  flex:1;max-width:320px;padding:.5rem .875rem;
  border:1.5px solid var(--line-strong);border-radius:var(--r);
  font-family:var(--body);font-size:.875rem;color:var(--ink);
  background:var(--bg);outline:none;transition:border-color .15s;
}
.header-search:focus{border-color:var(--accent);background:#fff}
.header-search::placeholder{color:var(--muted)}
.connected-badge{
  display:flex;align-items:center;gap:.375rem;
  font-size:.8125rem;font-weight:500;color:var(--accent);
  margin-left:auto;
}
.connected-dot{width:8px;height:8px;border-radius:50%;background:#22c55e;flex-shrink:0}
.btn-disconnect{
  padding:.5rem 1rem;background:transparent;border:1.5px solid var(--line-strong);
  border-radius:var(--r);font-family:var(--body);font-size:.8125rem;font-weight:500;
  color:var(--muted);cursor:pointer;transition:all .15s;
}
.btn-disconnect:hover{border-color:#c0392b;color:#c0392b}
.tab-btn{
  padding:.5rem 1rem;background:transparent;border:1.5px solid transparent;
  border-radius:var(--r);font-family:var(--body);font-size:.875rem;font-weight:600;
  color:var(--muted);cursor:pointer;transition:all .15s;
}
.tab-btn:hover{color:var(--ink)}
.tab-btn.active{background:var(--accent-soft);color:var(--accent-ink)}

/* MAIN CONTENT */
#main{padding:1.5rem;display:none}
#main.visible{display:block}

/* BILLING OVERVIEW */
#billing-panel{padding:1.5rem}
#billing-panel.hidden{display:none}
.billing-table{width:100%;border-collapse:collapse;background:var(--card);border-radius:var(--r);overflow:hidden;box-shadow:0 1px 3px rgba(0,0,0,.06)}
.billing-table th{text-align:left;font-size:.75rem;font-weight:600;text-transform:uppercase;letter-spacing:.04em;color:var(--muted);padding:.75rem 1rem;border-bottom:1.5px solid var(--line)}
.billing-table td{padding:.75rem 1rem;font-size:.875rem;border-bottom:1px solid var(--line);vertical-align:middle}
.billing-table tr:last-child td{border-bottom:none}
.plan-status-badge{font-size:.75rem;font-weight:600;padding:.2rem .55rem;border-radius:999px}
.plan-status-badge.active{background:var(--accent-soft);color:var(--accent-ink)}
.plan-status-badge.past_due,.plan-status-badge.unpaid,.plan-status-badge.incomplete,.plan-status-badge.incomplete_expired{background:var(--warn-soft);color:var(--warn)}
.plan-status-badge.canceled,.plan-status-badge.none{background:var(--bg);color:var(--muted)}
.btn-mini{padding:.35rem .7rem;font-size:.75rem;font-weight:600;border-radius:8px;border:1.5px solid var(--line-strong);background:#fff;color:var(--ink);cursor:pointer;transition:all .15s;margin-right:.35rem}
.btn-mini:hover{border-color:var(--accent);color:var(--accent-ink)}
.btn-mini:disabled{opacity:.5;cursor:default}

/* SKELETON */
.skeleton-grid{
  display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:1rem;
}
.skeleton-card{
  background:var(--card);border-radius:var(--r);padding:1.25rem;
  border:1.5px solid var(--line);
}
.skel{
  background:linear-gradient(90deg,#e5ebe8 25%,#f0f4f2 50%,#e5ebe8 75%);
  background-size:200% 100%;animation:shimmer 1.4s infinite;
  border-radius:6px;
}
@keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}
.skel-title{height:22px;width:60%;margin-bottom:.875rem}
.skel-badge{height:18px;width:80px;border-radius:999px}
.skel-row{display:flex;gap:.5rem;margin-top:.75rem}
.skel-chip{height:22px;width:70px;border-radius:999px}
.skel-stats{height:14px;width:50%;margin-top:1rem}
.skel-actions{display:flex;gap:.5rem;margin-top:1rem}
.skel-btn{height:32px;flex:1}

/* CLIENT GRID */
.client-grid{
  display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:1rem;
}

/* CLIENT CARD */
.client-card{
  background:var(--card);border-radius:var(--r);padding:1.25rem;
  border:1.5px solid var(--line);position:relative;
  transition:box-shadow .18s,border-color .18s;
}
.client-card:hover{box-shadow:0 4px 20px rgba(14,124,90,.1);border-color:var(--line-strong)}
.card-top{display:flex;align-items:flex-start;justify-content:space-between;gap:.5rem;margin-bottom:.875rem}
.client-name{font-family:var(--disp);font-size:1.0625rem;font-weight:600;color:var(--ink);line-height:1.25}
.health-dot{
  width:10px;height:10px;border-radius:50%;flex-shrink:0;margin-top:4px;
}
.health-dot.green{background:#22c55e;box-shadow:0 0 0 3px rgba(34,197,94,.2)}
.health-dot.yellow{background:#f59e0b;box-shadow:0 0 0 3px rgba(245,158,11,.2)}
.health-dot.red{background:#ef4444;box-shadow:0 0 0 3px rgba(239,68,68,.2)}
.status-row{display:flex;align-items:center;gap:.5rem;flex-wrap:wrap;margin-bottom:.75rem}
.badge{display:inline-flex;align-items:center;font-size:.75rem;font-weight:600;padding:.2rem .6rem;border-radius:999px}
.badge-active{background:#dcfce7;color:#166534}
.badge-suspended{background:#fee2e2;color:#991b1b}
.chip{
  display:inline-flex;align-items:center;font-size:.7rem;font-weight:500;
  padding:.2rem .55rem;border-radius:999px;background:var(--accent-soft);color:var(--accent-ink);
  font-family:var(--mono);
}
.card-stats{
  display:flex;gap:1.25rem;padding:.625rem 0;
  border-top:1px solid var(--line);border-bottom:1px solid var(--line);
  margin-bottom:.875rem;
}
.stat-item{display:flex;flex-direction:column;gap:.125rem}
.stat-value{font-family:var(--mono);font-size:.9375rem;font-weight:500;color:var(--ink)}
.stat-label{font-size:.7rem;font-weight:500;color:var(--muted);text-transform:uppercase;letter-spacing:.04em}
.last-seen{font-size:.7875rem;color:var(--muted);margin-bottom:.875rem}
.last-seen span{font-weight:500;color:var(--ink)}
.card-actions{display:flex;align-items:center;gap:.5rem}
.btn-edit{
  padding:.4375rem .875rem;background:var(--bg);border:1.5px solid var(--line-strong);
  border-radius:8px;font-family:var(--body);font-size:.8125rem;font-weight:500;
  color:var(--ink);cursor:pointer;transition:all .15s;
}
.btn-edit:hover{border-color:var(--accent);color:var(--accent)}
.btn-toggle{
  padding:.4375rem .875rem;border:1.5px solid;
  border-radius:8px;font-family:var(--body);font-size:.8125rem;font-weight:500;
  cursor:pointer;transition:all .15s;
}
.btn-toggle.suspend{background:var(--warn-soft);border-color:#e0a96d;color:var(--warn)}
.btn-toggle.suspend:hover{background:#f6dec0}
.btn-toggle.activate{background:#dcfce7;border-color:#86efac;color:#166534}
.btn-toggle.activate:hover{background:#bbf7d0}
.btn-view{
  margin-left:auto;padding:.4375rem .875rem;background:var(--accent);color:#fff;
  border:none;border-radius:8px;font-family:var(--body);font-size:.8125rem;font-weight:500;
  text-decoration:none;display:inline-flex;align-items:center;gap:.375rem;
  transition:background .15s;cursor:pointer;
}
.btn-view:hover{background:var(--accent-ink)}

/* EDIT MODAL */
#edit-overlay{
  position:fixed;inset:0;z-index:500;
  background:rgba(10,20,16,0.78);backdrop-filter:blur(4px);
  display:flex;align-items:center;justify-content:center;padding:1rem;
}
#edit-overlay.hidden{display:none}
.edit-modal{
  background:var(--card);border-radius:16px;width:100%;max-width:620px;
  max-height:90vh;display:flex;flex-direction:column;
  box-shadow:0 24px 64px rgba(0,0,0,0.28);
}
.edit-modal-header{
  padding:1.5rem 1.75rem 1rem;border-bottom:1.5px solid var(--line);
  display:flex;align-items:center;justify-content:space-between;
}
.edit-modal-header h2{font-family:var(--disp);font-size:1.125rem;font-weight:700}
.btn-close{
  background:none;border:none;font-size:1.25rem;cursor:pointer;color:var(--muted);
  width:32px;height:32px;display:flex;align-items:center;justify-content:center;
  border-radius:6px;transition:background .15s;
}
.btn-close:hover{background:var(--bg)}
.edit-modal-body{padding:1.25rem 1.75rem;overflow-y:auto;flex:1}
.edit-modal-footer{
  padding:1rem 1.75rem;border-top:1.5px solid var(--line);
  display:flex;gap:.75rem;justify-content:flex-end;
}
.btn-save{
  padding:.625rem 1.5rem;background:var(--accent);color:#fff;
  border:none;border-radius:var(--r);font-family:var(--body);font-size:.875rem;
  font-weight:600;cursor:pointer;transition:background .15s;
}
.btn-save:hover{background:var(--accent-ink)}
.btn-save:disabled{opacity:.6;cursor:not-allowed}
.btn-cancel{
  padding:.625rem 1.25rem;background:transparent;border:1.5px solid var(--line-strong);
  border-radius:var(--r);font-family:var(--body);font-size:.875rem;font-weight:500;
  color:var(--muted);cursor:pointer;transition:all .15s;
}
.btn-cancel:hover{border-color:var(--ink);color:var(--ink)}
.modal-form-group{margin-bottom:1rem}
.modal-form-group label{display:block;font-size:.8rem;font-weight:500;color:var(--ink);margin-bottom:.375rem}
.modal-form-group input,.modal-form-group textarea{
  width:100%;padding:.5625rem .875rem;border:1.5px solid var(--line-strong);
  border-radius:8px;font-family:var(--body);font-size:.875rem;color:var(--ink);
  background:#fff;outline:none;transition:border-color .15s;resize:vertical;
}
.modal-form-group input:focus,.modal-form-group textarea:focus{border-color:var(--accent)}
.modal-form-group textarea{min-height:100px;font-family:var(--mono);font-size:.8125rem;line-height:1.6}
.modal-form-row{display:grid;grid-template-columns:1fr 1fr;gap:.75rem}
.modal-section-label{
  font-size:.75rem;font-weight:600;color:var(--muted);
  text-transform:uppercase;letter-spacing:.06em;
  margin:1.25rem 0 .75rem;border-top:1px solid var(--line);padding-top:1rem;
}
#save-status{font-size:.8125rem;font-weight:500;padding:.5rem .75rem;border-radius:6px;display:none}
#save-status.success{background:#dcfce7;color:#166534}
#save-status.error{background:#fee2e2;color:#991b1b}

/* ── PROFESSIONAL POLISH ── */
.client-card{transition:box-shadow .2s,border-color .2s,transform .15s}
.client-card:hover{box-shadow:0 4px 20px rgba(14,124,90,.09);border-color:var(--accent);transform:translateY(-1px)}
.btn-primary{transition:background .15s,transform .1s,box-shadow .15s;box-shadow:0 1px 3px rgba(14,124,90,.2)}
.btn-primary:hover{box-shadow:0 3px 10px rgba(14,124,90,.25);transform:translateY(-1px)}
.btn-primary:active{transform:none;box-shadow:none}
.btn-edit{transition:all .15s}
.btn-view{transition:background .15s,transform .1s}
.btn-view:hover{transform:translateY(-1px)}
.skel{background:linear-gradient(90deg,#e8edea 25%,#f2f6f4 50%,#e8edea 75%);background-size:200% 100%;animation:shimmer 1.6s infinite}
.health-dot{transition:box-shadow .2s}
.badge-active,.badge-suspended{border-radius:6px}
#header{box-shadow:0 1px 0 var(--line),0 2px 8px rgba(0,0,0,.04)}
.header-search{transition:border-color .15s,background .15s,box-shadow .15s}
.header-search:focus{box-shadow:0 0 0 3px rgba(14,124,90,.1)}
.edit-modal{box-shadow:0 16px 64px rgba(0,0,0,.2),0 4px 16px rgba(0,0,0,.1);animation:modalIn .2s cubic-bezier(.22,.61,.36,1)}
@keyframes modalIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}
.login-card{animation:loginIn .35s cubic-bezier(.22,.61,.36,1);box-shadow:0 24px 80px rgba(0,0,0,.32)}
@keyframes loginIn{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:none}}
.modal-form-group input:focus,.modal-form-group textarea:focus{box-shadow:0 0 0 3px rgba(14,124,90,.1)}
.btn-save{transition:background .15s,box-shadow .15s}
.btn-save:hover{box-shadow:0 2px 8px rgba(14,124,90,.2)}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-thumb{background:#C2CEC9;border-radius:4px}
::-webkit-scrollbar-thumb:hover{background:#9AADA8}

/* EMPTY STATE */
.empty-state{
  text-align:center;padding:4rem 2rem;
  color:var(--muted);font-size:.9375rem;
}
.empty-state svg{margin-bottom:1rem;opacity:.4}

/* TOAST */
.toast{
  position:fixed;bottom:1.5rem;right:1.5rem;z-index:9999;
  background:var(--ink);color:#fff;padding:.75rem 1.25rem;
  border-radius:var(--r);font-size:.875rem;font-weight:500;
  box-shadow:0 8px 24px rgba(0,0,0,0.2);
  transform:translateY(100px);opacity:0;
  transition:transform .3s,opacity .3s;
  max-width:320px;
}
.toast.show{transform:translateY(0);opacity:1}
.toast.success{background:#166534}
.toast.error{background:#991b1b}
</style>
</head>

<script>
'use strict';

// ── CONFIG — no secrets here anymore. The Worker holds the master NocoDB token, the admin
// passcode, and the Stripe key server-side; this page only ever sends/receives a short-lived
// signed session token, the same way dashboard.html does for per-client logins. ──
const CONFIG = {
  WORKER_BASE:        'https://leadvyne-api-proxy.leadvyne.workers.dev',
  CLIENTS_TABLE_ID:   'mxl33bg4wi70fqj',
  ANALYTICS_TABLE_ID: 'm2in19v8n7phitr',
};
// ─────────────────────────────────────────────────────────────

let adminSessionToken = sessionStorage.getItem('lv_admin_session') || '';

// base points at the Worker's admin-authenticated NocoDB passthrough, not NocoDB directly —
// every existing call site below (loadClients, fetchClientAnalytics, toggleStatus, the edit
// modal save) is unchanged, since `${cfg.base}/api/v2/tables/...` still resolves correctly,
// just through the Worker instead of straight to NocoDB.
function getConfig() {
  return {
    base:      CONFIG.WORKER_BASE + '/admin/nocodb',
    clients:   CONFIG.CLIENTS_TABLE_ID,
    analytics: CONFIG.ANALYTICS_TABLE_ID,
    token:     adminSessionToken,
  };
}

// ── Toast ─────────────────────────────────────────────────────
let toastTimeout;
function showToast(msg, type = '') {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = 'toast show' + (type ? ' ' + type : '');
  clearTimeout(toastTimeout);
  toastTimeout = setTimeout(() => { el.className = 'toast'; }, 3000);
}

// ── NocoDB API (via the Worker's admin-authenticated passthrough) ──────────────
async function apiGet(url, token) {
  const res = await fetch(url, { headers: { 'Authorization': 'Bearer ' + token } });
  if (!res.ok) throw new Error(`HTTP ${res.status}`);
  return res.json();
}

async function apiPatch(url, token, body) {
  const res = await fetch(url, {
    method: 'PATCH',
    headers: { 'Authorization': 'Bearer ' + token, 'Content-Type': 'application/json' },
    body: JSON.stringify(body),
  });
  if (!res.ok) throw new Error(`HTTP ${res.status}`);
  return res.json();
}

// ── State ─────────────────────────────────────────────────────
let allClients = [];
let editingId = null;

// ── DOM refs ──────────────────────────────────────────────────
const loginOverlay = document.getElementById('login-overlay');
const header = document.getElementById('header');
const main = document.getElementById('main');
const grid = document.getElementById('client-grid');
const countBadge = document.getElementById('count-badge');
const searchInput = document.getElementById('search-input');
const editOverlay = document.getElementById('edit-overlay');
const billingPanel = document.getElementById('billing-panel');
const billingTbody = document.getElementById('billing-tbody');

// ── Login ─────────────────────────────────────────────────────
document.getElementById('btn-connect').addEventListener('click', async () => {
  const passcode = document.getElementById('f-token').value.trim();
  const errEl = document.getElementById('login-error');
  errEl.style.display = 'none';

  if (!passcode) {
    errEl.textContent = 'Enter the admin passcode.';
    errEl.style.display = 'block';
    return;
  }

  const btn = document.getElementById('btn-connect');
  btn.disabled = true; btn.textContent = 'Connecting…';

  try {
    // The passcode is checked server-side against a Worker secret — it's never compared or
    // stored in this page. A short-lived signed session token is all that's kept, the same
    // pattern dashboard.html uses for per-client logins.
    const res = await fetch(`${CONFIG.WORKER_BASE}/admin/login`, {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ passcode }),
    });
    const data = await res.json().catch(() => ({}));
    if (!res.ok || !data.session_token) throw new Error(data.error || `HTTP ${res.status}`);
    adminSessionToken = data.session_token;
    sessionStorage.setItem('lv_admin_session', adminSessionToken);
    document.getElementById('f-token').value = '';
    showApp();
  } catch(e) {
    errEl.textContent = e.message || 'Login failed.';
    errEl.style.display = 'block';
    btn.disabled = false; btn.textContent = 'Connect →';
  }
});

document.getElementById('btn-disconnect').addEventListener('click', () => {
  allClients = [];
  adminSessionToken = '';
  sessionStorage.removeItem('lv_admin_session');
  grid.innerHTML = '';
  header.style.display = 'none';
  main.classList.remove('visible');
  loginOverlay.classList.remove('hidden');
  document.getElementById('f-token').value = '';
});

// ── App init ──────────────────────────────────────────────────
function showApp() {
  loginOverlay.classList.add('hidden');
  header.style.display = 'flex';
  main.classList.add('visible');
  loadClients();
}

// ── Skeleton ──────────────────────────────────────────────────
function renderSkeletons(n = 3) {
  grid.innerHTML = '';
  for (let i = 0; i < n; i++) {
    grid.innerHTML += `
      <div class="skeleton-card">
        <div class="skel skel-title"></div>
        <div class="skel skel-badge"></div>
        <div class="skel-row">
          <div class="skel skel-chip"></div>
          <div class="skel skel-chip"></div>
        </div>
        <div class="skel skel-stats"></div>
        <div class="skel-actions">
          <div class="skel skel-btn"></div>
          <div class="skel skel-btn"></div>
        </div>
      </div>`;
  }
}

// ── Load clients ──────────────────────────────────────────────
async function loadClients() {
  const cfg = getConfig();
  renderSkeletons(6);
  try {
    const data = await apiGet(
      `${cfg.base}/api/v2/tables/${cfg.clients}/records?limit=100`,
      cfg.token
    );
    allClients = data.list || [];
    countBadge.textContent = `${allClients.length} client${allClients.length !== 1 ? 's' : ''}`;
    renderGrid(allClients);
    fetchAllAnalytics();
  } catch(e) {
    if (e.message.includes('401')) {
      // Session expired — send back to the login screen instead of an error the user can't act on.
      adminSessionToken = '';
      sessionStorage.removeItem('lv_admin_session');
      header.style.display = 'none';
      main.classList.remove('visible');
      loginOverlay.classList.remove('hidden');
      document.getElementById('login-error').textContent = 'Session expired — please log in again.';
      document.getElementById('login-error').style.display = 'block';
      return;
    }
    grid.innerHTML = `<div class="empty-state"><p>Failed to load clients: ${e.message}</p></div>`;
    showToast('Failed to load clients', 'error');
  }
}

// ── Render grid ───────────────────────────────────────────────
function renderGrid(clients) {
  if (!clients.length) {
    grid.innerHTML = '<div class="empty-state"><p>No clients found.</p></div>';
    return;
  }
  grid.innerHTML = clients.map(renderCard).join('');
  attachCardListeners();
}

function healthDotClass(client) {
  const active = client.active === 'Yes';
  if (!active) return 'red';
  if (!client.last_seen) return 'yellow';
  const ms = Date.now() - new Date(client.last_seen).getTime();
  return ms < 86400000 ? 'green' : 'yellow';
}

function formatLastSeen(ts) {
  if (!ts) return 'Never';
  const d = new Date(ts);
  const diff = Date.now() - d.getTime();
  if (diff < 60000) return 'Just now';
  if (diff < 3600000) return `${Math.floor(diff/60000)}m ago`;
  if (diff < 86400000) return `${Math.floor(diff/3600000)}h ago`;
  return d.toLocaleDateString('en-GB', { day:'numeric', month:'short', year:'numeric' });
}

function renderCard(c) {
  const active = c.active === 'Yes';
  const hClass = healthDotClass(c);
  const statusBadge = active
    ? '<span class="badge badge-active">Active</span>'
    : '<span class="badge badge-suspended">Suspended</span>';
  const langChip = c.language ? `<span class="chip">${escHtml(c.language)}</span>` : '';
  const modelChip = c.model ? `<span class="chip">${escHtml(c.model)}</span>` : '';
  const toggleBtn = active
    ? `<button class="btn-toggle suspend" data-id="${c.Id}" data-action="suspend">Suspend</button>`
    : `<button class="btn-toggle activate" data-id="${c.Id}" data-action="activate">Activate</button>`;

  return `
    <div class="client-card" data-id="${c.Id}" id="card-${c.Id}">
      <div class="card-top">
        <div class="client-name">${escHtml(c.client_name || 'Unnamed Client')}</div>
        <div class="health-dot ${hClass}" title="Health: ${hClass}"></div>
      </div>
      <div class="status-row">
        ${statusBadge}
        ${langChip}
        ${modelChip}
      </div>
      <div class="card-stats">
        <div class="stat-item">
          <span class="stat-value" id="msgs-${c.Id}">—</span>
          <span class="stat-label">msgs</span>
        </div>
        <div class="stat-item">
          <span class="stat-value" id="errs-${c.Id}">—</span>
          <span class="stat-label">errors</span>
        </div>
      </div>
      <div class="last-seen">Last seen: <span>${formatLastSeen(c.last_seen)}</span></div>
      <div class="card-actions">
        <button class="btn-edit" data-id="${c.Id}">Edit</button>
        ${toggleBtn}
        <a class="btn-view" href="dashboard.html" target="_blank">Dashboard ↗</a>
      </div>
    </div>`;
}

function attachCardListeners() {
  grid.querySelectorAll('.btn-edit').forEach(btn => {
    btn.addEventListener('click', () => openEditModal(btn.dataset.id));
  });
  grid.querySelectorAll('.btn-toggle').forEach(btn => {
    btn.addEventListener('click', () => toggleStatus(btn.dataset.id, btn.dataset.action));
  });
}

// ── Lazy analytics fetch ──────────────────────────────────────
async function fetchAllAnalytics() {
  const cfg = getConfig();
  for (const c of allClients) {
    fetchClientAnalytics(c.Id, cfg);
  }
}

async function fetchClientAnalytics(clientId, cfg) {
  try {
    const data = await apiGet(
      `${cfg.base}/api/v2/tables/${cfg.analytics}/records?where=(ClientId,eq,${clientId})&limit=1000`,
      cfg.token
    );
    const records = data.list || [];
    const total = records.length;
    const errors = records.filter(r => r.error || r.Error || r.is_error).length;
    const msgsEl = document.getElementById(`msgs-${clientId}`);
    const errsEl = document.getElementById(`errs-${clientId}`);
    if (msgsEl) msgsEl.textContent = total.toLocaleString();
    if (errsEl) errsEl.textContent = errors.toLocaleString();
  } catch(_) { /* silent fail per card */ }
}

// ── Toggle status ─────────────────────────────────────────────
async function toggleStatus(clientId, action) {
  const cfg = getConfig();
  const newVal = action === 'suspend' ? 'No' : 'Yes';
  const card = document.getElementById(`card-${clientId}`);

  // Optimistic update
  const idx = allClients.findIndex(c => c.Id == clientId);
  if (idx !== -1) allClients[idx].active = newVal;

  try {
    await apiPatch(
      `${cfg.base}/api/v2/tables/${cfg.clients}/records`,
      cfg.token,
      { Id: clientId, active: newVal }
    );
    // Re-render this card
    if (card && idx !== -1) {
      card.outerHTML = renderCard(allClients[idx]);
      attachCardListeners();
      document.getElementById(`msgs-${clientId}`) && null; // keep stats if in DOM
    }
    showToast(action === 'suspend' ? 'Client suspended' : 'Client activated', 'success');
  } catch(e) {
    // Revert
    if (idx !== -1) allClients[idx].active = newVal === 'Yes' ? 'No' : 'Yes';
    showToast('Failed to update status: ' + e.message, 'error');
  }
}

// ── Edit modal ────────────────────────────────────────────────
function openEditModal(clientId) {
  const c = allClients.find(cl => cl.Id == clientId);
  if (!c) return;
  editingId = clientId;

  document.getElementById('edit-modal-title').textContent = `Edit — ${c.client_name || 'Client'}`;
  document.getElementById('e-client-name').value = c.client_name || '';
  document.getElementById('e-language').value = c.language || '';
  document.getElementById('e-model').value = c.model || '';
  document.getElementById('e-chatwoot-base').value = c.chatwoot_base || '';
  document.getElementById('e-chatwoot-account').value = c.chatwoot_account_id || '';
  document.getElementById('e-chatwoot-inbox').value = c.chatwoot_inbox_id || '';
  document.getElementById('e-main-prompt').value = c.main_prompt || '';
  document.getElementById('e-followup-count').value = c.followup_count || '';
  document.getElementById('e-followup-hours').value = c.followup_hours || '';
  document.getElementById('e-followup-messages').value = c.followup_messages || '';

  const status = document.getElementById('save-status');
  status.style.display = 'none';
  document.getElementById('btn-save-modal').disabled = false;

  editOverlay.classList.remove('hidden');
}

document.getElementById('btn-close-modal').addEventListener('click', closeModal);
document.getElementById('btn-cancel-modal').addEventListener('click', closeModal);
editOverlay.addEventListener('click', e => { if (e.target === editOverlay) closeModal(); });

function closeModal() { editOverlay.classList.add('hidden'); editingId = null; }

document.getElementById('btn-save-modal').addEventListener('click', async () => {
  if (!editingId) return;
  const cfg = getConfig();
  const btn = document.getElementById('btn-save-modal');
  const status = document.getElementById('save-status');
  btn.disabled = true; btn.textContent = 'Saving…';
  status.style.display = 'none';

  const patch = {
    Id: editingId,
    client_name: document.getElementById('e-client-name').value,
    language: document.getElementById('e-language').value,
    model: document.getElementById('e-model').value,
    chatwoot_base: document.getElementById('e-chatwoot-base').value,
    chatwoot_account_id: document.getElementById('e-chatwoot-account').value,
    chatwoot_inbox_id: document.getElementById('e-chatwoot-inbox').value,
    main_prompt: document.getElementById('e-main-prompt').value,
    followup_count: parseInt(document.getElementById('e-followup-count').value) || 0,
    followup_hours: parseInt(document.getElementById('e-followup-hours').value) || 0,
    followup_messages: document.getElementById('e-followup-messages').value,
  };

  try {
    await apiPatch(`${cfg.base}/api/v2/tables/${cfg.clients}/records`, cfg.token, patch);
    // Update local state
    const idx = allClients.findIndex(c => c.Id == editingId);
    if (idx !== -1) Object.assign(allClients[idx], patch);

    status.textContent = 'Saved successfully!';
    status.className = 'success'; status.style.display = 'block';
    btn.textContent = 'Save Changes'; btn.disabled = false;

    // Re-render the card
    const card = document.getElementById(`card-${editingId}`);
    if (card && idx !== -1) {
      const newHtml = renderCard(allClients[idx]);
      card.outerHTML = newHtml;
      attachCardListeners();
    }
    showToast('Client updated', 'success');
    setTimeout(closeModal, 800);
  } catch(e) {
    status.textContent = 'Save failed: ' + e.message;
    status.className = 'error'; status.style.display = 'block';
    btn.textContent = 'Save Changes'; btn.disabled = false;
  }
});

// ── Billing Overview ────────────────────────────────────────────
// Independent of the client grid — reads live from NocoDB (the same plan_name/plan_status/
// plan_renews_at fields the customer's own Billing page and webhook keep in sync) plus lets the
// admin force a live pull from Stripe or jump into a customer's Stripe Portal, without ever
// needing the Stripe secret key or the master NocoDB token in this page.
function switchTab(tab) {
  document.getElementById('tab-clients').classList.toggle('active', tab === 'clients');
  document.getElementById('tab-billing').classList.toggle('active', tab === 'billing');
  main.classList.toggle('visible', tab === 'clients');
  billingPanel.classList.toggle('hidden', tab !== 'billing');
  if (tab === 'billing') loadBillingOverview();
}

function formatRenewDate(iso) {
  if (!iso) return '—';
  return new Date(iso).toLocaleDateString('en-GB', { day: 'numeric', month: 'short', year: 'numeric' });
}

async function loadBillingOverview() {
  billingTbody.innerHTML = `<tr><td colspan="7" style="color:var(--muted)">Loading…</td></tr>`;
  try {
    const res = await fetch(`${CONFIG.WORKER_BASE}/admin/clients-billing`, {
      headers: { 'Authorization': 'Bearer ' + adminSessionToken },
    });
    const data = await res.json().catch(() => ({}));
    if (!res.ok) throw new Error(data.error || `HTTP ${res.status}`);
    renderBillingTable(data.clients || []);
  } catch(e) {
    billingTbody.innerHTML = `<tr><td colspan="7" style="color:#c0392b">Failed to load: ${escHtml(e.message)}</td></tr>`;
  }
}

function renderBillingTable(clients) {
  if (!clients.length) {
    billingTbody.innerHTML = `<tr><td colspan="7" style="color:var(--muted)">No clients found.</td></tr>`;
    return;
  }
  billingTbody.innerHTML = clients.map(c => {
    const status = c.plan_status || 'none';
    const renewLabel = c.plan_cancel_at_period_end === 'Yes' ? 'Ends' : 'Renews';
    return `
    <tr id="billing-row-${c.Id}">
      <td><strong>${escHtml(c.client_name || 'Unnamed')}</strong><br><span style="color:var(--muted);font-size:.75rem">${escHtml(c.authentik_email || '')}</span></td>
      <td>${escHtml(c.plan_name || '—')}</td>
      <td><span class="plan-status-badge ${escHtml(status)}">${escHtml(status)}</span></td>
      <td>${c.plan_renews_at ? renewLabel + ': ' + formatRenewDate(c.plan_renews_at) : '—'}</td>
      <td>${Number(c.wa_credits_balance || 0).toLocaleString()}</td>
      <td>${c.voice_addon_active === 'Yes' ? '✅' : '—'}</td>
      <td id="billing-actions-${c.Id}">
        <button class="btn-mini" onclick="refreshClientBilling(${c.Id})">🔄 Refresh</button>
        <button class="btn-mini" onclick="openClientPortal(${c.Id})" ${c.stripe_customer_id ? '' : 'disabled title="No Stripe customer yet"'}>Portal ↗</button>
        <button class="btn-mini" onclick="resetBillingCycle(${c.Id})" ${c.stripe_subscription_id ? '' : 'disabled title="No active subscription"'}>⏱ Reset Cycle</button>
      </td>
    </tr>`;
  }).join('');
}

async function refreshClientBilling(clientId) {
  const cell = document.getElementById(`billing-actions-${clientId}`);
  const prevHtml = cell.innerHTML;
  cell.innerHTML = 'Syncing…';
  try {
    const res = await fetch(`${CONFIG.WORKER_BASE}/admin/billing-refresh`, {
      method: 'POST',
      headers: { 'Authorization': 'Bearer ' + adminSessionToken, 'Content-Type': 'application/json' },
      body: JSON.stringify({ client_id: clientId }),
    });
    const data = await res.json().catch(() => ({}));
    if (!res.ok) throw new Error(data.error || `HTTP ${res.status}`);
    showToast('Synced — plan status: ' + (data.plan_status || '—'), 'success');
    loadBillingOverview();
  } catch(e) {
    cell.innerHTML = prevHtml;
    showToast('Sync failed: ' + e.message, 'error');
  }
}

// Resets a customer's billing cycle to start now instead of waiting for the current period to
// end (Stripe's Subscription Update only supports 'now', not an arbitrary date). Two separate
// confirms — this immediately changes the customer's next charge date and, if prorated, their
// invoice — so it shouldn't be one accidental click.
async function resetBillingCycle(clientId) {
  if (!confirm('Reset this customer\'s billing cycle to start now? Their renewal date changes immediately.')) return;
  const prorate = confirm('Also prorate the shortened/lengthened period (charge or credit the difference)?\n\nOK = prorate, Cancel = no proration.');
  const cell = document.getElementById(`billing-actions-${clientId}`);
  const prevHtml = cell.innerHTML;
  cell.innerHTML = 'Resetting…';
  try {
    const res = await fetch(`${CONFIG.WORKER_BASE}/admin/billing-reset-anchor`, {
      method: 'POST',
      headers: { 'Authorization': 'Bearer ' + adminSessionToken, 'Content-Type': 'application/json' },
      body: JSON.stringify({ client_id: clientId, prorate }),
    });
    const data = await res.json().catch(() => ({}));
    if (!res.ok) throw new Error(data.error || `HTTP ${res.status}`);
    showToast('Billing cycle reset' + (prorate ? ' (prorated)' : ''), 'success');
    loadBillingOverview();
  } catch(e) {
    cell.innerHTML = prevHtml;
    showToast('Reset failed: ' + e.message, 'error');
  }
}

async function openClientPortal(clientId) {
  try {
    const res = await fetch(`${CONFIG.WORKER_BASE}/admin/billing-portal-link`, {
      method: 'POST',
      headers: { 'Authorization': 'Bearer ' + adminSessionToken, 'Content-Type': 'application/json' },
      body: JSON.stringify({ client_id: clientId }),
    });
    const data = await res.json().catch(() => ({}));
    if (!res.ok || !data.url) throw new Error(data.error || `HTTP ${res.status}`);
    window.open(data.url, '_blank', 'noopener');
  } catch(e) {
    showToast('Could not open portal: ' + e.message, 'error');
  }
}

// ── Search ────────────────────────────────────────────────────
searchInput.addEventListener('input', () => {
  const q = searchInput.value.toLowerCase().trim();
  const filtered = q ? allClients.filter(c =>
    (c.client_name || '').toLowerCase().includes(q)
  ) : allClients;
  renderGrid(filtered);
  // Re-fetch analytics for visible cards
  const cfg = getConfig();
  filtered.forEach(c => fetchClientAnalytics(c.Id, cfg));
});

// ── Util ──────────────────────────────────────────────────────
function escHtml(s) {
  return String(s)
    .replace(/&/g,'&amp;')
    .replace(/</g,'&lt;')
    .replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;');
}

// ── Boot ──────────────────────────────────────────────────────
(function boot() {
  // Resume an existing admin session (survives a page refresh) — if the stored token has since
  // expired, the first API call below fails with 401 and falls back to the login screen.
  if (adminSessionToken) {
    showApp();
  }
})();
</script>
