server {
    listen 80;
    server_name leadvyne.com www.leadvyne.com;
    root /usr/share/nginx/html;

    location / {
        try_files /index.html =404;
    }
}

server {
    listen 80;
    server_name app.leadvyne.com;
    root /usr/share/nginx/html;

    location / {
        try_files $uri $uri/ /dashboard.html;
    }

    # Block access to index.html on app subdomain
    location = /index.html {
        return 301 https://leadvyne.com/;
    }

    # Onboard signup form
    location = /onboard {
        try_files /index.html =404;
    }
}
