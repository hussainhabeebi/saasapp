server {
    listen 80;
    server_name leadvyne.com www.leadvyne.com;
    root /usr/share/nginx/html;

    location / {
        try_files /index.html =404;
    }
}

server {
    listen 80;
    server_name app.leadvyne.com;
    root /usr/share/nginx/html;

    location / {
        try_files $uri $uri/ /dashboard.html;
    }

    # Block access to index.html on app subdomain
    location = /index.html {
        return 301 https://leadvyne.com/;
    }

    # Onboard signup form
    location = /onboard {
        try_files /index.html =404;
    }
}

server {
    listen 80;
    server_name onshope.com www.onshope.com;
    root /usr/share/nginx/html;

    location = / {
        try_files /onshope-home.html =404;
    }

    # Real static files (favicon, etc.) still resolve normally — only bare single-segment
    # paths like /vintage1950 fall through to the slug rewrite below.
    location / {
        try_files $uri $uri/ @store;
    }

    # /<slug> -> onshope-store.html?slug=<slug>. This is the only URL shape a client's store
    # link ever has on this domain — deliberately not reusing saasapp's own store.html or its
    # ?client=<id> convention (see frontend/onshope-store.html's header comment).
    location @store {
        rewrite ^/([a-zA-Z0-9_-]+)/?$ /onshope-store.html?slug=$1 last;
    }
}
