<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>onshope — WhatsApp Commerce Directory</title>
<!-- onshope.com homepage: a supplier/store directory (IndiaMART-style) listing every client
     that has published a store. Same read-only /ecom/public/* backend as onshope-store.html —
     no create/update/delete path, no leads/orders access. -->
<style>
:root{
  --bg:#F7F8FC;--card:#FFFFFF;--ink:#101828;--muted:#667085;
  --accent:#155EEF;--accent-ink:#0B44C0;--accent-soft:#EAF1FF;
  --line:#E4E7EC;--wa:#25D366;
  --body:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;
}
*{box-sizing:border-box}
html,body{margin:0;background:var(--bg);color:var(--ink);font-family:var(--body);-webkit-font-smoothing:antialiased}
a{color:inherit;text-decoration:none}
.hero{background:linear-gradient(135deg,var(--accent-ink),var(--accent));color:#fff;padding:48px 20px 64px;text-align:center}
.hero-brand{font-size:20px;font-weight:800;letter-spacing:-.02em;margin-bottom:18px}
.hero h1{font-size:26px;font-weight:800;margin:0 0 10px;letter-spacing:-.02em}
.hero p{font-size:14.5px;opacity:.9;margin:0 auto 22px;max-width:440px}
.search-wrap{max-width:480px;margin:0 auto}
.search{width:100%;border:none;border-radius:12px;padding:14px 16px;font-family:var(--body);font-size:15px;color:var(--ink);background:#fff;box-shadow:0 8px 24px rgba(11,68,192,.25)}
.search:focus{outline:2px solid rgba(255,255,255,.6)}
.wrap{max-width:960px;margin:-32px auto 0;padding:0 16px 40px;position:relative}
.section-label{font-size:13px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.04em;margin:28px 0 12px}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:14px}
.card{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:18px;display:flex;flex-direction:column;gap:10px;box-shadow:0 2px 10px rgba(16,24,40,.04)}
.store-avatar{width:44px;height:44px;border-radius:10px;background:var(--accent-soft);color:var(--accent-ink);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:17px}
.store-name{font-size:15px;font-weight:700;line-height:1.3}
.visit-btn{margin-top:auto;text-align:center;background:var(--accent-soft);color:var(--accent-ink);border-radius:10px;padding:9px;font-size:13.5px;font-weight:700}
.card:hover .visit-btn{background:var(--accent);color:#fff}
.empty{text-align:center;color:var(--muted);padding:60px 20px;font-size:14px}
.foot{text-align:center;color:var(--muted);font-size:12px;padding:24px 16px}
</style>
</head>
<body>

<div class="hero">
  <div class="hero-brand">🛍️ onshope</div>
  <h1>WhatsApp Commerce Directory</h1>
  <p>Browse local businesses and order straight on WhatsApp — no app, no account, no hassle.</p>
  <div class="search-wrap">
    <input class="search" id="searchBox" placeholder="Search stores..." oninput="renderStores()">
  </div>
</div>

<div class="wrap">
  <div class="section-label" id="countLabel">Stores</div>
  <div class="grid" id="grid"></div>
  <div class="empty" id="emptyMsg" style="display:none">No stores found.</div>
</div>

<div class="foot">onshope — WhatsApp commerce for local businesses</div>

<script>
const WORKER_BASE = 'https://leadvyne-api-proxy.leadvyne.workers.dev';
let allStores = [];

function escHtml(s){ return String(s==null?'':s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
function initials(name){ return String(name||'?').trim().split(/\s+/).slice(0,2).map(w=>w[0]).join('').toUpperCase(); }

function renderStores(){
  const q = (document.getElementById('searchBox').value||'').toLowerCase().trim();
  const list = q ? allStores.filter(s => (s.client_name||'').toLowerCase().includes(q)) : allStores;

  document.getElementById('countLabel').textContent = `${list.length} Store${list.length===1?'':'s'}`;
  document.getElementById('emptyMsg').style.display = list.length ? 'none' : 'block';
  document.getElementById('grid').innerHTML = list.map(s => `
    <a class="card" href="/${encodeURIComponent(s.client_slug)}">
      <div class="store-avatar">${escHtml(initials(s.client_name))}</div>
      <div class="store-name">${escHtml(s.client_name)}</div>
      <div class="visit-btn">Visit Store →</div>
    </a>
  `).join('');
}

async function load(){
  try{
    const r = await fetch(`${WORKER_BASE}/ecom/public/stores`);
    const data = await r.json();
    allStores = data.list || [];
    renderStores();
  }catch(e){
    document.getElementById('emptyMsg').textContent = "Couldn't load stores right now.";
    document.getElementById('emptyMsg').style.display = 'block';
  }
}
load();
</script>
</body>
</html>
