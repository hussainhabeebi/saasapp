version: '3.8'
services:
  leadvyne-nba:
    build: .
    image: leadvyne-nba:latest
    restart: unless-stopped
    environment:
      NOCODB_BASE: ${NOCODB_BASE:-https://whizz.aiingo.com}
      NOCODB_TOKEN: ${NOCODB_TOKEN}
      CLIENTS_TABLE: ${CLIENTS_TABLE:-mxl33bg4wi70fqj}
      TZ: ${TZ:-UTC}
      RUN_NOW: ${RUN_NOW:-0}
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  leadvyne-recovery:
    build: .
    image: leadvyne-nba:latest
    command: ["node", "recovery.js"]
    restart: unless-stopped
    environment:
      NOCODB_BASE: ${NOCODB_BASE:-https://whizz.aiingo.com}
      NOCODB_TOKEN: ${NOCODB_TOKEN}
      CLIENTS_TABLE: ${CLIENTS_TABLE:-mxl33bg4wi70fqj}
      RECOVERY_LOOKBACK_DAYS: ${RECOVERY_LOOKBACK_DAYS:-60}
      RECOVERY_SEND_DELAY_MS: ${RECOVERY_SEND_DELAY_MS:-600}
      TZ: ${TZ:-UTC}
      RUN_NOW: ${RUN_NOW:-0}
      # Optional — only used for clients with Settings → Voice → Voice Follow-ups turned on. Same
      # Sarvam AI key as the Cloudflare Worker's SARVAM_API_KEY secret; leave unset/empty to keep
      # the recovery ladder text-only.
      SARVAM_API_KEY: ${SARVAM_API_KEY:-}
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
